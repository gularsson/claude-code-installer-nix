name: Update Claude Code

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for update
        id: check
        run: |
          BUCKET="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
          LATEST=$(curl -fsSL "$BUCKET/latest")
          CURRENT=$(grep 'version = "' flake.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update flake.nix
        if: steps.check.outputs.update == 'true'
        run: |
          BUCKET="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
          VERSION="${{ steps.check.outputs.latest }}"
          MANIFEST=$(curl -fsSL "$BUCKET/$VERSION/manifest.json")

          to_sri() {
            python3 -c "import base64,binascii;print('sha256-'+base64.b64encode(binascii.unhexlify('$1')).decode())"
          }

          X64_HEX=$(echo "$MANIFEST" | jq -r '.platforms["linux-x64"].checksum')
          ARM64_HEX=$(echo "$MANIFEST" | jq -r '.platforms["linux-arm64"].checksum')
          X64_SRI=$(to_sri "$X64_HEX")
          ARM64_SRI=$(to_sri "$ARM64_HEX")

          sed -i "s|version = \".*\"; # auto-updated|version = \"$VERSION\"; # auto-updated|" flake.nix
          # Update x86_64 hash (first occurrence)
          sed -i "0,/hash = \"sha256-.*\"; # auto-updated/{s|hash = \"sha256-.*\"; # auto-updated|hash = \"$X64_SRI\"; # auto-updated|}" flake.nix
          # Update aarch64 hash (second occurrence)
          sed -i "0,/hash = \"sha256-.*\"; # auto-updated/! { s|hash = \"sha256-.*\"; # auto-updated|hash = \"$ARM64_SRI\"; # auto-updated| }" flake.nix

          echo "Updated to $VERSION"

      - name: Commit and push
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "update claude-code to ${{ steps.check.outputs.latest }}"
          git push

  build:
    needs: update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # get latest (possibly just updated)

      - uses: cachix/install-nix-action@v31

      - name: Build x86_64-linux
        run: nix build .#packages.x86_64-linux.claude-code --print-out-paths

      - name: Verify
        run: |
          ./result/bin/claude --version
