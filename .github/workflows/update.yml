name: Update Claude Code

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      updated: ${{ steps.check.outputs.update }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for update
        id: check
        run: |
          BUCKET="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
          LATEST=$(curl -fsSL "$BUCKET/latest")
          CURRENT=$(grep 'version = "' flake.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update flake.nix
        if: steps.check.outputs.update == 'true'
        run: |
          BUCKET="https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"
          VERSION="${{ steps.check.outputs.latest }}"
          MANIFEST=$(curl -fsSL "$BUCKET/$VERSION/manifest.json")

          to_sri() {
            python3 -c "import base64,binascii;print('sha256-'+base64.b64encode(binascii.unhexlify('$1')).decode())"
          }

          X64_HEX=$(echo "$MANIFEST" | jq -r '.platforms["linux-x64"].checksum')
          ARM64_HEX=$(echo "$MANIFEST" | jq -r '.platforms["linux-arm64"].checksum')
          X64_SRI=$(to_sri "$X64_HEX")
          ARM64_SRI=$(to_sri "$ARM64_HEX")

          sed -i "s|version = \".*\"; # auto-updated|version = \"$VERSION\"; # auto-updated|" flake.nix
          sed -i "0,/hash = \"sha256-.*\"; # auto-updated/{s|hash = \"sha256-.*\"; # auto-updated|hash = \"$X64_SRI\"; # auto-updated|}" flake.nix
          sed -i "0,/hash = \"sha256-.*\"; # auto-updated/! { s|hash = \"sha256-.*\"; # auto-updated|hash = \"$ARM64_SRI\"; # auto-updated| }" flake.nix

          echo "Updated to $VERSION"

      - name: Commit and push
        if: steps.check.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "update claude-code to ${{ steps.check.outputs.latest }}"
          git push

      - name: Get current version
        id: version
        run: |
          VERSION=$(grep 'version = "' flake.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: cachix/install-nix-action@v31

      - name: Build x86_64-linux
        run: nix build .#packages.x86_64-linux.claude-code --print-out-paths

      - name: Verify
        run: ./result/bin/claude --version

  release:
    needs: [update, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch upstream changelog
        id: changelog
        run: |
          VERSION="${{ needs.update.outputs.version }}"
          BODY=$(curl -fsSL "https://api.github.com/repos/anthropics/claude-code/releases/tags/v${VERSION}" \
            | jq -r '.body // empty') || true
          {
            echo "notes<<CHANGELOG_EOF"
            echo "Auto-updated Claude Code to ${VERSION}"
            if [ -n "$BODY" ]; then
              echo ""
              echo "## Upstream Changelog"
              echo ""
              echo "$BODY"
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          VERSION="v${{ needs.update.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping"
          else
            gh release create "$VERSION" \
              --title "Claude Code ${{ needs.update.outputs.version }}" \
              --notes "$RELEASE_NOTES" \
              --latest
          fi
